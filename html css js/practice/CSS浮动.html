<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS浮动</title>
    <style>
        .father{
            background-color: aquamarine;
            /*height: 150px*/;
            border: 3px solid brown;
            /*overflow: hidden*/;
        }
        .father::after{
            content: "";
            display: table;
            clear: both;
        }

        .left-son{
            width: 100px;
            height: 100px;
            background-color: yellowgreen;
            float: left;   /*向左浮动*/
        }
        .right-son{
            width: 100px;
            height: 100px;
            background-color: yellow;
            float: right;   /*向右浮动*/
        }
    </style>
</head>
<body>
    <div class="father">
        <div class="left-son">左浮动</div>
        
        <div class="right-son">右浮动</div>
    </div>
</body>
</html>
